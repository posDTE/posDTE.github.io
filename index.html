<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Monitor API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6f9;
    }
    .card-status {
      transition: 0.3s ease;
    }
    pre {
      background: #1e1e1e;
      color: #00ff90;
      padding: 15px;
      border-radius: 10px;
      max-height: 300px;
      overflow: auto;
    }
  </style>
</head>
<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow card-status">
        <div class="card-body text-center">

          <h3 class="mb-3">Estado de API</h3>

          <button id="btnConsultar" class="btn btn-primary">
            Verificar /enlinea
          </button>

          <div class="mt-4">
            <h5 id="estadoTexto">Esperando consulta...</h5>
          </div>

          <div class="mt-3">
            <pre id="resultadoJson">Sin datos...</pre>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const btn = document.getElementById("btnConsultar");
  const estadoTexto = document.getElementById("estadoTexto");
  const resultadoJson = document.getElementById("resultadoJson");
  const card = document.querySelector(".card-status");

  btn.addEventListener("click", async () => {

    estadoTexto.innerText = "Consultando...";
    resultadoJson.innerText = "";
    card.classList.remove("border-success", "border-danger");
    
    try {

      const response = await fetch("https://claims-banners-incentives-reviewed.trycloudflare.com/enlinea");

      if (!response.ok) {
        throw new Error("Error HTTP: " + response.status);
      }

      const data = await response.json();

      estadoTexto.innerText = "API EN LÍNEA ✅";
      estadoTexto.classList.add("text-success");
      card.classList.add("border", "border-success");

      resultadoJson.innerText = JSON.stringify(data, null, 2);

    } catch (error) {

      estadoTexto.innerText = "API FUERA DE SERVICIO ❌";
      estadoTexto.classList.remove("text-success");
      estadoTexto.classList.add("text-danger");
      card.classList.add("border", "border-danger");

      resultadoJson.innerText = error.toString();

    }

  });
</script>

</body>
</html>
